<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ofertas Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:linear-gradient(180deg,#111,#1f1f1f,#000);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:white;
}

/* CONTAINER */

.container{
max-width:420px;
width:100%;
background:#161616;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

/* HEADER */

.header{
background:linear-gradient(90deg,#d4af37,#f5d76e);
color:#000;
text-align:center;
padding:25px;
}

.header h1{
font-size:36px;
font-weight:800;
}

/* CONTENT */

.content{
padding:30px;
text-align:center;
}

.subtitle{
color:#ccc;
margin-bottom:25px;
font-size:15px;
}

/* BOX */

.box{
background:#222;
padding:18px;
border-radius:12px;
margin-bottom:15px;
font-size:14px;
}

/* BOTÃO */

.btn{
display:block;
margin-top:20px;
background:linear-gradient(90deg,#d4af37,#f5d76e);
color:#000;
text-decoration:none;
padding:18px;
border-radius:10px;
font-weight:700;
font-size:18px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* FOOTER */

.footer{
margin-top:15px;
font-size:12px;
color:#888;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>OFERTA PREMIUM</h1>
</div>

<div class="content">

<div class="subtitle">
Confira as ofertas disponíveis agora.
</div>

<div class="box">✔ Acesso rápido às ofertas</div>
<div class="box">✔ Descontos disponíveis</div>
<div class="box">✔ Processo simples</div>

<a class="btn" href="https://cliente-0354e8.netlify.app/">
ACESSAR OFERTAS
</a>

<div class="footer">
Você será redirecionado para a página de ofertas.
</div>

</div>

</div>

</body>
</html>
